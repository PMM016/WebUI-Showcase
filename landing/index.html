<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Pages Showcase | WebUI Collection</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Ubuntu:wght@500;600&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #1a3c2f;
            --secondary: #4ade80;
            --accent: #eab308;
        }
        body {
            font-family: 'Open Sans', sans-serif;
        }
        h1, h2, h3, h4, h5 { font-family: 'Nunito', sans-serif; }
        .title-font { font-family: 'Ubuntu', sans-serif; }

        .card {
            transition: all 0.4s ease;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .screenshot {
            height: 240px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover .screenshot {
            transform: scale(1.08);
        }
        .squiggle {
            background-image: linear-gradient(to bottom, var(--primary) 0%, var(--primary) 100%);
            background-position: 0 100%;
            background-repeat: repeat-x;
            background-size: 2px 2px;
            color: inherit;
            text-decoration: none;
        }
        .squiggle:hover {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 4'%3E%3Cstyle type='text/css'%3E.squiggle{animation:shift .3s linear infinite;}@keyframes shift {from {transform:translateX(0);}to {transform:translateX(-15px);}}%3C/style%3E%3Cpath fill='none' stroke='%231a3c2f' stroke-width='2' class='squiggle' d='M0,3.5 c 5,0,5,-3,10,-3 s 5,3,10,3 c 5,0,5,-3,10,-3 s 5,3,10,3'/%3E%3C/svg%3E");
            background-size: auto 4px;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold title-font" href="#">WebUI Showcase</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="../index.html">← Back to Home</a></li>
                    <li class="nav-item">
                        <button id="themeToggle" class="btn btn-outline-light ms-3">
                            <i class="bi bi-sun-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button id="settingsBtn" class="btn btn-outline-light ms-2">
                            <i class="bi bi-gear-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="bg-dark text-white py-5">
        <div class="container text-center py-4" data-aos="fade-down">
            <h1 class="display-4 fw-bold title-font">Landing Pages Collection</h1>
            <p class="lead mb-0">20 Premium, Fully Customizable Landing Page Templates</p>
            <p class="text-muted">Built with Bootstrap 5 • AOS • Swiper • Modern Animations</p>
        </div>
    </section>

    <div class="container py-5">
        <div class="row g-4" id="templatesContainer">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title title-font">Customize Theme</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Primary Color</label>
                        <input type="color" id="colorPrimary" class="form-control form-control-color w-100" value="#1a3c2f">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Secondary Color</label>
                        <input type="color" id="colorSecondary" class="form-control form-control-color w-100" value="#4ade80">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Accent Color</label>
                        <input type="color" id="colorAccent" class="form-control form-control-color w-100" value="#eab308">
                    </div>
                    <button id="resetColors" class="btn btn-outline-secondary w-100">Reset to Default</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const templates = [
            {
                number: 1,
                name: "Nexlify Finance",
                industry: "Fintech",
                desc: "Modern sleek fintech landing page with animated charts",
                img: "https://via.placeholder.com/800x500/0f172a/60a5fa?text=Nexlify+Finance",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/nexlify"
            },
            {
                number: 2,
                name: "Thunder Eagles FC",
                industry: "Sports / Football",
                desc: "Dynamic football club landing page with high energy design",
                img: "https://via.placeholder.com/800x500/7f1d1d/ef4444?text=Thunder+Eagles",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/thuneagles",
                demo2: "https://pmm016.github.io/WebUI-Showcase/landing/thuneaglesfc"
            },
            {
                number: 3,
                name: "IronForge Fitness",
                industry: "Gym / Fitness",
                desc: "Powerful gym and fitness studio landing page",
                img: "https://via.placeholder.com/800x500/111827/f3e8ff?text=IronForge+Fitness",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/ironforge"
            },
            {
                number: 4,
                name: "SpiceRoute",
                industry: "Food Delivery / Restaurant",
                desc: "Appetizing food delivery and restaurant landing page",
                img: "https://via.placeholder.com/800x500/431407/fdbca8?text=SpiceRoute",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/spiceroute",
                demo2: "https://pmm016.github.io/WebUI-Showcase/landing/spiceroute2"
            },
            {
                number: 5,
                name: "Lumina Wear",
                industry: "Fashion E-commerce",
                desc: "Luxury fashion store landing page",
                img: "https://via.placeholder.com/800x500/312e81/ddd6fe?text=Lumina+Wear",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/lumina",
                demo2: "https://pmm016.github.io/WebUI-Showcase/landing/lumina2"
            },
            {
                number: 6,
                name: "WildGuard Africa",
                industry: "Wildlife Conservation",
                desc: "Emotional and impactful wildlife conservation landing page",
                img: "https://via.placeholder.com/800x500/1a3c2f/ffffff?text=WildGuard+Africa",
                demo1: "https://pmm016.github.io/WebUI-Showcase/landing/wildgaurdafrica",
                demo2: "https://pmm016.github.io/WebUI-Showcase/landing/wildgaurdafrica2"
            }
        ];

        function renderTemplates() {
            const container = document.getElementById('templatesContainer');
            container.innerHTML = '';

            templates.forEach(template => {
                const cardHTML = `
                    <div class="col-lg-6 col-xl-4" data-aos="fade-up">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="${template.img}" class="card-img-top screenshot" alt="${template.name}">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <span class="badge bg-dark mb-2">#${template.number}</span>
                                        <h5 class="card-title title-font fw-bold">${template.name}</h5>
                                        <p class="text-muted small mb-2">${template.industry}</p>
                                    </div>
                                </div>
                                <p class="card-text flex-grow-1">${template.desc}</p>
                                
                                <div class="mt-auto">
                                    <a href="${template.demo1}" target="_blank" class="btn btn-dark w-100 mb-2">
                                        <i class="bi bi-eye"></i> View Demo 1
                                    </a>
                                    ${template.demo2 ? `
                                    <a href="${template.demo2}" target="_blank" class="btn btn-outline-dark w-100">
                                        <i class="bi bi-eye"></i> View Demo 2
                                    </a>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Theme Toggler
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            themeToggle.innerHTML = document.documentElement.classList.contains('dark') 
                ? '<i class="bi bi-moon-fill"></i>' 
                : '<i class="bi bi-sun-fill"></i>';
        });

        // Settings Modal
        const settingsModal = new bootstrap.Modal(document.getElementById('settingsModal'));
        document.getElementById('settingsBtn').addEventListener('click', () => settingsModal.show());

        // Color Picker Logic
        function updateColors() {
            document.documentElement.style.setProperty('--primary', document.getElementById('colorPrimary').value);
            document.documentElement.style.setProperty('--secondary', document.getElementById('colorSecondary').value);
            document.documentElement.style.setProperty('--accent', document.getElementById('colorAccent').value);
        }

        document.getElementById('colorPrimary').addEventListener('input', updateColors);
        document.getElementById('colorSecondary').addEventListener('input', updateColors);
        document.getElementById('colorAccent').addEventListener('input', updateColors);

        document.getElementById('resetColors').addEventListener('click', () => {
            document.getElementById('colorPrimary').value = '#1a3c2f';
            document.getElementById('colorSecondary').value = '#4ade80';
            document.getElementById('colorAccent').value = '#eab308';
            updateColors();
        });

        // Initialize
        window.onload = () => {
            AOS.init({ once: true });
            renderTemplates();
        };
    </script>
</body>
</html>
