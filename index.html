<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebUI Showcase - Login Templates</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Open+Sans:wght@400;600&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #00ff9f;
            --accent: #ff00ff;
            --bg: #0a0a0a;
        }
        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Ubuntu', sans-serif;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #1a0033, #000000);
            padding: 100px 0 80px;
        }
        .brand {
            font-family: 'Nunito', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .swiper-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .iframe-container {
            width: 100%;
            max-width: 420px;
            height: 620px;
            border: 12px solid #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 255, 159, 0.15);
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .template-name {
            margin-top: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .settings-panel {
            position: fixed;
            top: 80px;
            right: 30px;
            width: 280px;
            background: rgba(15,15,15,0.98);
            border: 1px solid var(--primary);
            padding: 25px;
            border-radius: 12px;
            z-index: 10000;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-black border-bottom border-primary">
        <div class="container">
            <a class="navbar-brand brand fs-3" href="#">WebUI</a>
            <div class="d-flex align-items-center gap-3">
                <button class="icon-btn btn btn-outline-light" id="themeToggle">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                <button class="icon-btn btn btn-outline-light" id="settingsTrigger">
                    <i class="bi bi-gear-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="brand display-1 mb-3">Login Templates</h1>
            <p class="lead mb-4">A premium collection of modern, interactive &amp; fully customizable login pages</p>
            <p class="text-muted">Built with love by a UI Designer</p>
        </div>
    </section>

    <!-- Swiper Showcase -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5" data-aos="fade-up">Featured Login Templates</h2>
            
            <div class="swiper mainSwiper">
                <div class="swiper-wrapper" id="swiperWrapper">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="swiper-pagination mt-4"></div>
            </div>
        </div>
    </section>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h5 class="mb-3">Theme Customizer</h5>
        <div class="mb-3">
            <label class="form-label">Primary Color</label>
            <input type="color" id="primaryPicker" value="#00ff9f" class="form-control form-control-color w-100">
        </div>
        <div class="mb-3">
            <label class="form-label">Accent Color</label>
            <input type="color" id="accentPicker" value="#ff00ff" class="form-control form-control-color w-100">
        </div>
        <button class="btn btn-outline-danger w-100" id="resetColors">Reset to Default</button>
    </div>

    <!-- Footer -->
    <footer class="py-5 text-center border-top border-dark">
        <p>Made with ❤️ for beautiful web experiences</p>
        <p class="text-muted small">PMM016 • WebUI Showcase</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const templates = [
            { name: "CyberPulse", file: "login/CyberPulse.html" },
            { name: "NebulaVault", file: "login/NebulaVault.html" },
            { name: "AuroraAccess", file: "login/AuroraAccess.html" },
            { name: "QuantumShield", file: "login/QuantumShield.html" },
            { name: "VelvetDream", file: "login/VelvetDream.html" },
            { name: "MysticVeil", file: "login/MysticVeil.html" },
            { name: "StormForge", file: "login/stormforge.html" }
        ];

        // Populate Swiper
        const wrapper = document.getElementById('swiperWrapper');
        templates.forEach(t => {
            const slide = document.createElement('div');
            slide.className = "swiper-slide";
            slide.innerHTML = `
                <div class="iframe-container">
                    <iframe src="${t.file}" title="${t.name}"></iframe>
                </div>
                <div class="template-name">${t.name}</div>
                <a href="${t.file}" target="_blank" class="btn btn-outline-primary mt-3">
                    <i class="bi bi-box-arrow-up-right"></i> View Fullscreen
                </a>
            `;
            wrapper.appendChild(slide);
        });

        // Initialize Swiper
        new Swiper('.mainSwiper', {
            loop: true,
            slidesPerView: 1,
            spaceBetween: 30,
            centeredSlides: true,
            pagination: { el: ".swiper-pagination", clickable: true },
            autoplay: { delay: 5000, disableOnInteraction: false },
            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 }
            }
        });

        AOS.init();

        // Theme Toggler
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        // Settings
        const settingsPanel = document.getElementById('settingsPanel');
        document.getElementById('settingsTrigger').addEventListener('click', () => {
            settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('primaryPicker').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--primary', e.target.value);
        });
        document.getElementById('accentPicker').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--accent', e.target.value);
        });
        document.getElementById('resetColors').addEventListener('click', () => {
            document.documentElement.style.setProperty('--primary', '#00ff9f');
            document.documentElement.style.setProperty('--accent', '#ff00ff');
            document.getElementById('primaryPicker').value = '#00ff9f';
            document.getElementById('accentPicker').value = '#ff00ff';
        });
    </script>
</body>
</html>
