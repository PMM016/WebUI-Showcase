<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumShield | Secure Access</title>
    
    <!-- Fonts: Nunito, Ubuntu, Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Open+Sans:wght@400;600&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Swiper CSS -->
    <link href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" rel="stylesheet">

    <style>
        /* --- CSS Variables & Theme Setup --- */
        :root {
            /* Default Colors */
            --primary: #BFFF00; /* Neon Lime */
            --accent: #00F0FF;  /* Cyber Cyan */
            --bg-color: #050505;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 0 30px rgba(191, 255, 0, 0.15);
            --input-bg: rgba(0, 0, 0, 0.5);
            
            /* Font Assignments */
            --font-head: 'Nunito', sans-serif;
            --font-body: 'Ubuntu', sans-serif;
            --font-form: 'Open Sans', sans-serif;
        }

        /* Light Theme Overrides */
        [data-theme="light"] {
            --bg-color: #e0e0e0;
            --text-color: #121212;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Background Grid Animation --- */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(191, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(191, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
            perspective: 500px;
        }

        /* Floating particles/glow */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--primary); }
        .orb-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: var(--accent); }

        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* --- Header & Nav --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-logo {
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-color);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo i { color: var(--primary); }

        .nav-controls { display: flex; gap: 20px; align-items: center; }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .icon-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* --- Main Glass Card --- */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 1000px;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Holographic Scanline Effect */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary);
            opacity: 0.3;
            box-shadow: 0 0 15px var(--primary);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 105%; opacity: 0; }
        }

        /* Left Side: Visuals */
        .card-visual {
            flex: 1;
            background: rgba(0,0,0,0.2);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        .shield-container {
            width: 180px;
            height: 180px;
            margin-bottom: 30px;
            position: relative;
        }
        
        /* SVG Shield Styling */
        .shield-svg path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease;
        }
        .shield-core {
            fill: var(--primary);
            opacity: 0.1;
            filter: blur(5px);
        }
        
        /* Animation for shield */
        .spin-slow { animation: spin 10s linear infinite; transform-origin: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .counter-box {
            margin-top: 20px;
        }
        .counter-val {
            font-family: var(--font-head);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .counter-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Swiper inside card */
        .security-swiper {
            width: 100%;
            margin-top: 30px;
            height: 80px;
        }
        .swiper-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .swiper-slide i {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        /* Right Side: Forms */
        .card-form {
            flex: 1;
            padding: 50px;
            position: relative;
        }

        h2 {
            font-family: var(--font-head);
            font-weight: 700;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        /* Tabs */
        .nav-pills { margin-bottom: 30px; }
        .nav-pills .nav-link {
            color: var(--text-color);
            border-radius: 0;
            padding: 10px 20px;
            font-family: var(--font-form);
            font-weight: 600;
            position: relative;
            background: transparent !important;
            border: none !important;
        }
        .nav-pills .nav-link.active {
            color: var(--primary);
        }
        .nav-pills .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--primary);
        }
        .nav-pills .nav-link.active::after { width: 80%; }

        /* Form Elements */
        .form-label {
            font-family: var(--font-form);
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: var(--font-form);
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.7);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(191, 255, 0, 0.2);
            color: #fff;
        }
        [data-theme="light"] .form-control:focus {
            color: #000;
        }
        
        .btn-primary {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            font-family: var(--font-head);
            font-weight: 700;
            width: 100%;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary);
            color: #000;
        }

        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .form-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .form-footer a:hover { text-decoration: underline; }

        /* --- Settings Popup --- */
        .settings-modal {
            position: fixed;
            top: 0;
            right: -300px; /* Hidden */
            width: 300px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            z-index: 1050;
            padding: 30px;
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
        }
        .settings-modal.active { right: 0; }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }
        .settings-header h3 { font-family: var(--font-head); font-size: 1.2rem; }
        .close-settings { cursor: pointer; color: var(--text-color); font-size: 1.2rem; }
        
        .control-group { margin-bottom: 25px; }
        .control-label { display: block; margin-bottom: 10px; font-size: 0.9rem; opacity: 0.8; }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--glass-border); border-radius: 5px; }

        .btn-reset {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
        }
        .btn-reset:hover { background: #ff4d4d; color: white; }

        /* --- Toast Notification --- */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }
        .custom-toast {
            background: rgba(10, 10, 10, 0.9);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.4s ease;
            margin-top: 10px;
        }
        .custom-toast.show { transform: translateX(0); }
        .toast-icon { color: var(--primary); font-size: 1.2rem; }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .glass-card { flex-direction: column-reverse; }
            .card-visual { border-right: none; border-bottom: 1px solid var(--glass-border); padding: 30px; }
            .shield-container { width: 120px; height: 120px; }
            .card-form { padding: 30px; }
            .security-swiper { display: none; }
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-grid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- Header -->
    <header>
        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved"></i>
            <span>QUANTUM<span style="color:var(--primary)">SHIELD</span></span>
        </div>
        <div class="nav-controls">
            <!-- Theme Toggler -->
            <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <!-- Settings Trigger -->
            <button class="icon-btn" id="settingsTrigger" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="glass-card" data-aos="zoom-in" data-aos-duration="800">
            <div class="scanline"></div>
            
            <!-- Left: Visuals & Swiper -->
            <div class="card-visual">
                <div class="shield-container">
                    <!-- SVG Animation -->
                    <svg class="shield-svg" viewBox="0 0 200 200" width="100%" height="100%">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:var(--primary);stop-opacity:1" />
                                <stop offset="100%" style="stop-color:var(--accent);stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle class="shield-core" cx="100" cy="100" r="60" />
                        <path class="spin-slow" d="M100 20 L180 60 L180 140 C180 170 100 190 100 190 C100 190 20 170 20 140 L20 60 Z" stroke="url(#grad1)" stroke-width="2" />
                        <path d="M70 90 L90 110 L130 70" stroke="var(--text-color)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                    </svg>
                </div>

                <h4 style="font-family: var(--font-head); margin-bottom:5px;">Secure Systems</h4>
                
                <!-- Vanilla Counter -->
                <div class="counter-box">
                    <div class="counter-val" data-target="8492">0</div>
                    <div class="counter-label">Encrypted Connections</div>
                </div>

                <!-- Swiper Carousel -->
                <div class="swiper security-swiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <i class="fa-solid fa-fingerprint"></i>
                            <span>Biometric Auth</span>
                        </div>
                        <div class="swiper-slide">
                            <i class="fa-solid fa-lock"></i>
                            <span>256-bit AES</span>
                        </div>
                        <div class="swiper-slide">
                            <i class="fa-solid fa-cloud"></i>
                            <span>Quantum Cloud</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Interactive Forms -->
            <div class="card-form">
                <h2 id="formTitle">Welcome Back</h2>
                <p class="subtitle">Access your secure dashboard.</p>

                <!-- Tabs Navigation -->
                <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab" aria-selected="true">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-signup-tab" data-bs-toggle="pill" data-bs-target="#pills-signup" type="button" role="tab" aria-selected="false">Signup</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-forgot-tab" data-bs-toggle="pill" data-bs-target="#pills-forgot" type="button" role="tab" aria-selected="false">Reset</button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content" id="pills-tabContent">
                    
                    <!-- Login Form -->
                    <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Identity (Email)</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="agent@quantum.shield" required>
                            </div>
                            <div class="mb-3">
                                <label for="loginPass" class="form-label">Passcode</label>
                                <input type="password" class="form-control" id="loginPass" placeholder="••••••••" required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4" style="font-size: 0.8rem;">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Remember Node</label>
                                </div>
                                <a href="#" style="color: var(--text-color); opacity: 0.6; text-decoration:none;" onclick="switchTab('forgot')">Lost Key?</a>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-right-to-bracket me-2"></i> Initialize
                            </button>
                        </form>
                    </div>

                    <!-- Signup Form -->
                    <div class="tab-pane fade" id="pills-signup" role="tabpanel">
                        <form id="signupForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="signFname" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="signFname" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="signLname" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="signLname" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="signEmail" class="form-label">Secure Email</label>
                                <input type="email" class="form-control" id="signEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="signPass" class="form-label">Create Passcode</label>
                                <input type="password" class="form-control" id="signPass" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-user-plus me-2"></i> Register Agent
                            </button>
                        </form>
                    </div>

                    <!-- Forgot Password Form -->
                    <div class="tab-pane fade" id="pills-forgot" role="tabpanel">
                        <form id="forgotForm">
                            <div class="mb-3">
                                <label for="forgotEmail" class="form-label">Recovery Email</label>
                                <input type="email" class="form-control" id="forgotEmail" placeholder="Enter your registered ID" required>
                                <small style="opacity: 0.6; font-size: 0.8rem;">We will send a quantum encryption key to this address.</small>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-paper-plane me-2"></i> Send Recovery Key
                            </button>
                        </form>
                    </div>
                </div>

                <div class="form-footer">
                    <p style="font-size: 0.75rem; opacity: 0.5; margin-top: 20px;">
                        <i class="fa-solid fa-shield-cat"></i> Protected by QuantumShield™ v2.0
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Popup -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <h3><i class="fa-solid fa-sliders me-2"></i> Interface</h3>
            <span class="close-settings" id="closeSettings"><i class="fa-solid fa-xmark"></i></span>
        </div>
        
        <div class="control-group">
            <label class="control-label">Primary Energy Color</label>
            <input type="color" id="primaryPicker" value="#BFFF00">
        </div>
        
        <div class="control-group">
            <label class="control-label">Accent Color</label>
            <input type="color" id="accentPicker" value="#00F0FF">
        </div>

        <div class="control-group">
            <label class="control-label">Background Intensity</label>
            <input type="range" class="form-range" min="0" max="100" value="40" id="bgRange">
        </div>

        <button class="btn-reset" id="resetColors">
            <i class="fa-solid fa-rotate-left me-2"></i> Reset to Default
        </button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. Initialize AOS ---
            AOS.init();

            // --- 2. Initialize Swiper ---
            const swiper = new Swiper('.security-swiper', {
                direction: 'vertical',
                loop: true,
                autoplay: {
                    delay: 2000,
                    disableOnInteraction: false,
                },
                speed: 800,
                effect: 'fade',
                fadeEffect: { crossFade: true }
            });

            // --- 3. Vanilla Counter Logic ---
            class VanillaCounter {
                constructor(element, options = {}) {
                    this.element = element;
                    this.target = parseInt(element.getAttribute('data-target'));
                    this.duration = options.duration || 2000;
                    this.start = 0;
                    this.startTime = null;
                    this.animate = this.animate.bind(this);
                    
                    // Intersection Observer to start counting when visible
                    this.observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                this.startTime = null;
                                requestAnimationFrame(this.animate);
                                this.observer.unobserve(this.element);
                            }
                        });
                    }, { threshold: 0.5 });
                    
                    this.observer.observe(this.element);
                }

                animate(timestamp) {
                    if (!this.startTime) this.startTime = timestamp;
                    const progress = timestamp - this.startTime;
                    const percentage = Math.min(progress / this.duration, 1);
                    
                    // Ease out quart function
                    const ease = 1 - Math.pow(1 - percentage, 4);
                    
                    const current = Math.floor(ease * (this.target - this.start) + this.start);
                    this.element.textContent = current.toLocaleString();

                    if (progress < this.duration) {
                        requestAnimationFrame(this.animate);
                    } else {
                        this.element.textContent = this.target.toLocaleString();
                    }
                }
            }

            // Init Counter
            const counterElement = document.querySelector('.counter-val');
            if(counterElement) new VanillaCounter(counterElement);

            // --- 4. Theme Toggler ---
            const themeBtn = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeBtn.querySelector('i');
            
            themeBtn.addEventListener('click', () => {
                const isLight = body.getAttribute('data-theme') === 'light';
                if (isLight) {
                    body.removeAttribute('data-theme');
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                } else {
                    body.setAttribute('data-theme', 'light');
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                }
            });

            // --- 5. Settings Popup & Color Manipulator ---
            const settingsTrigger = document.getElementById('settingsTrigger');
            const settingsModal = document.getElementById('settingsModal');
            const closeSettings = document.getElementById('closeSettings');
            const root = document.documentElement;

            // Toggle Modal
            function toggleSettings() {
                settingsModal.classList.toggle('active');
            }
            settingsTrigger.addEventListener('click', toggleSettings);
            closeSettings.addEventListener('click', toggleSettings);

            // Color Pickers
            const primaryPicker = document.getElementById('primaryPicker');
            const accentPicker = document.getElementById('accentPicker');
            const bgRange = document.getElementById('bgRange');
            const resetBtn = document.getElementById('resetColors');

            // Default Colors
            const defaults = {
                primary: '#BFFF00',
                accent: '#00F0FF'
            };

            function updateColors() {
                root.style.setProperty('--primary', primaryPicker.value);
                root.style.setProperty('--accent', accentPicker.value);
                // Adjust glow based on primary color automatically
                root.style.setProperty('--card-shadow', `0 0 30px ${primaryPicker.value}33`); // 33 is approx 20% opacity hex
            }

            primaryPicker.addEventListener('input', updateColors);
            accentPicker.addEventListener('input', updateColors);

            // Background Opacity Control
            bgRange.addEventListener('input', (e) => {
                const opacity = e.target.value / 100;
                const orb1 = document.querySelector('.orb-1');
                const orb2 = document.querySelector('.orb-2');
                orb1.style.opacity = opacity;
                orb2.style.opacity = opacity;
            });

            // Reset
            resetBtn.addEventListener('click', () => {
                primaryPicker.value = defaults.primary;
                accentPicker.value = defaults.accent;
                bgRange.value = 40;
                updateColors();
                document.querySelector('.orb-1').style.opacity = 0.4;
                document.querySelector('.orb-2').style.opacity = 0.4;
                
                // Reset theme to dark
                body.removeAttribute('data-theme');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            });

            // --- 6. Form Handling & Feedback (No Alerts) ---
            function showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'custom-toast';
                
                const iconClass = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
                const color = type === 'success' ? 'var(--primary)' : '#ff4d4d';
                
                toast.innerHTML = `
                    <i class="fa-solid ${iconClass} toast-icon" style="color:${color}"></i>
                    <span>${message}</span>
                `;
                
                container.appendChild(toast);
                
                // Animate in
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                // Remove after 3 seconds
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400); // Wait for transition
                }, 3000);
            }

            // Handle Login
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                const originalText = btn.innerHTML;
                
                // Loading State
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin me-2"></i> Authenticating...';
                
                setTimeout(() => {
                    showToast('Identity Verified. Access Granted.', 'success');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    // e.target.reset(); // Optional: keep form filled
                }, 1500);
            });

            // Handle Signup
            document.getElementById('signupForm').addEventListener('submit', (e) => {
                e.preventDefault();
                showToast('Agent Registration Complete. Welcome Aboard.', 'success');
            });

            // Handle Forgot Password
            document.getElementById('forgotForm').addEventListener('submit', (e) => {
                e.preventDefault();
                showToast('Recovery Key dispatched to secure channel.', 'success');
            });

            // Helper: Switch tabs programmatically (for "Lost Key" link)
            window.switchTab = function(tabId) {
                const tabButton = document.querySelector(`#pills-${tabId}-tab`);
                if(tabButton) {
                    const tabInstance = new bootstrap.Tab(tabButton);
                    tabInstance.show();
                }
            };
        });
    </script>
</body>
</html>
