<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Templates • WebUI Showcase</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Open+Sans:wght@400;600&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff9f;
            --accent: #ff00ff;
            --bg: #0a0a0a;
        }
        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Ubuntu', sans-serif;
            min-height: 100vh;
        }
        .brand {
            font-family: 'Nunito', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            transition: all 0.4s ease;
        }
        .card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 255, 159, 0.15);
        }
        .preview-img {
            height: 320px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }
        .section-header {
            font-family: 'Nunito', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top bg-black border-bottom border-primary">
        <div class="container">
            <a class="navbar-brand brand" href="../">WebUI</a>
            <a class="btn btn-outline-light" href="../">← Back to Main</a>
        </div>
    </nav>

    <!-- Hero Banner -->
    <section class="py-5 text-center" style="margin-top: 100px;padding-top: 120px; background: linear-gradient(135deg, #1a0033, #000);">
        <div class="container">
            <h1 class="brand">Login Templates</h1>
            <p class="lead text-muted">Beautiful • Interactive • Fully Customizable</p>
            <p class="text-light">Each template includes Login • Signup • Forgot Password with live color customizer &amp; theme toggler</p>
        </div>
    </section>

    <!-- Templates Grid -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4" id="templatesGrid">
                <!-- Cards will be injected by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-5 text-center border-top border-dark">
        <p>Made with ❤️ for beautiful interfaces</p>
        <p class="text-muted small">WebUI Showcase • Login Collection</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const templates = [
            { 
                name: "CyberPulse", 
                file: "CyberPulse.html", 
                desc: "Cyberpunk neon style with glitch effects",
                img: "https://i.ibb.co/QjQdh7Nb/Screenshot-2026-04-09-at-09-52-45-login2.png"
            },
            { 
                name: "NebulaVault", 
                file: "NebulaVault.html", 
                desc: "Futuristic space nebula design",
                img: "https://i.ibb.co/pvx5V27w/Screenshot-2026-04-09-at-09-36-46-login2.png"
            },
            { 
                name: "AuroraAccess", 
                file: "AuroraAccess.html", 
                desc: "Calm northern lights theme",
                img: "https://i.ibb.co/jPDtJp3s/Screenshot-2026-04-09-at-10-22-56-login2.png"
            },
            { 
                name: "QuantumShield", 
                file: "QuantumShield.html", 
                desc: "Holographic glassmorphic security",
                img: "https://i.ibb.co/bjsR6DYP/Screenshot-2026-04-09-at-10-36-13-login2.png"
            },
            { 
                name: "VelvetDream", 
                file: "VelvetDream.html", 
                desc: "Luxury gold & burgundy elegance",
                img: "https://i.ibb.co/bMxTQmY2/Screenshot-2026-04-09-at-10-42-31-login2.png"
            },
            { 
                name: "MysticVeil", 
                file: "MysticVeil.html", 
                desc: "Mystical crystal & moonlight",
                img: "https://i.ibb.co/x8s1fY7W/Screenshot-2026-04-09-at-11-37-54-login2.png"
            },
            { 
                name: "StormForge", 
                file: "stormforge.html", 
                desc: "Dark stormy tech design",
                img: "https://i.ibb.co/bgQjfrHD/Screenshot-2026-04-09-at-09-23-53-login2.png"
            }
        ];

        const grid = document.getElementById('templatesGrid');

        templates.forEach(t => {
            const cardHTML = `
                <div class="col-md-6 col-lg-4" data-aos="fade-up">
                    <div class="card h-100 card-hover">
                        <img src="${t.img}" class="preview-img w-100" alt="${t.name}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${t.name}</h5>
                            <p class="card-text text-muted flex-grow-1">${t.desc}</p>
                            <div class="d-flex gap-2">
                                <a href="${t.file}" target="_blank" class="btn btn-primary flex-fill">
                                    <i class="bi bi-eye"></i> View Live
                                </a>
                                <a href="${t.file}" class="btn btn-outline-light flex-fill" download>
                                    <i class="bi bi-download"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
